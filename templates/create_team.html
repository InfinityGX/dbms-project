{% extends 'base.html' %}

{% block title %}Create Team - Valorant Team Finder{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card large">
        <div class="form-header">
            <h1 class="form-title">CREATE TEAM</h1>
            <p class="form-subtitle">Start your own Valorant team</p>
        </div>
        
        <form method="POST" class="team-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Team Name *</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="Your team name" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="tag">Team Tag</label>
                    <input type="text" id="tag" name="tag" maxlength="5"
                           placeholder="e.g., TSM, SEN (max 5 chars)" class="form-input">
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" 
                          placeholder="Tell us about your team..." class="form-input"></textarea>
            </div>
            
            <div class="form-group">
                <label for="requirements">Requirements for Joining</label>
                <textarea id="requirements" name="requirements" rows="3" 
                          placeholder="What are you looking for in teammates? e.g., 'Gold+ rank, available evenings, good comms'" class="form-input"></textarea>
            </div>
            
            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="looking_for_players" value="1" checked>
                    <span class="checkmark"></span>
                    Currently looking for players
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-large">Create Team</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
