{% extends 'base.html' %}

{% block title %}Register - Valorant Team Finder{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">CREATE ACCOUNT</h1>
            <p class="auth-subtitle">Join the college Valorant community</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Enter your username" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="email">College Email</label>
                <input type="email" id="email" name="email" required 
                       placeholder="your.email@college.edu" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Create a strong password" class="form-input">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-large">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
