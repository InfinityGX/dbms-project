{% extends 'base.html' %}

{% block title %}Create Player Profile - Valorant Team Finder{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card large">
        <div class="form-header">
            <h1 class="form-title">CREATE PLAYER PROFILE</h1>
            <p class="form-subtitle">Set up your Valorant player profile</p>
        </div>
        
        <form method="POST" class="profile-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="game_username">Game Username *</label>
                    <input type="text" id="game_username" name="game_username" required 
                           placeholder="Your Valorant username#tag" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="rank">Current Rank *</label>
                    <select id="rank" name="rank" required class="form-input">
                        <option value="">Select your rank</option>
                        <option value="Iron 1">Iron 1</option>
                        <option value="Iron 2">Iron 2</option>
                        <option value="Iron 3">Iron 3</option>
                        <option value="Bronze 1">Bronze 1</option>
                        <option value="Bronze 2">Bronze 2</option>
                        <option value="Bronze 3">Bronze 3</option>
                        <option value="Silver 1">Silver 1</option>
                        <option value="Silver 2">Silver 2</option>
                        <option value="Silver 3">Silver 3</option>
                        <option value="Gold 1">Gold 1</option>
                        <option value="Gold 2">Gold 2</option>
                        <option value="Gold 3">Gold 3</option>
                        <option value="Platinum 1">Platinum 1</option>
                        <option value="Platinum 2">Platinum 2</option>
                        <option value="Platinum 3">Platinum 3</option>
                        <option value="Diamond 1">Diamond 1</option>
                        <option value="Diamond 2">Diamond 2</option>
                        <option value="Diamond 3">Diamond 3</option>
                        <option value="Ascendant 1">Ascendant 1</option>
                        <option value="Ascendant 2">Ascendant 2</option>
                        <option value="Ascendant 3">Ascendant 3</option>
                        <option value="Immortal 1">Immortal 1</option>
                        <option value="Immortal 2">Immortal 2</option>
                        <option value="Immortal 3">Immortal 3</option>
                        <option value="Radiant">Radiant</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="role">Primary Role *</label>
                    <select id="role" name="role" required class="form-input">
                        <option value="">Select your role</option>
                        <option value="Duelist">Duelist</option>
                        <option value="Initiator">Initiator</option>
                        <option value="Controller">Controller</option>
                        <option value="Sentinel">Sentinel</option>
                        <option value="Flex">Flex</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="main_agent">Main Agent</label>
                    <input type="text" id="main_agent" name="main_agent" 
                           placeholder="e.g., Jett, Sage, Omen" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="kd_ratio">K/D Ratio</label>
                    <input type="number" id="kd_ratio" name="kd_ratio" step="0.01" min="0" max="10"
                           placeholder="1.25" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="availability">Availability</label>
                    <input type="text" id="availability" name="availability" 
                           placeholder="e.g., Weekdays 7PM-11PM" class="form-input">
                </div>
            </div>
            
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3" 
                          placeholder="Tell teams about yourself..." class="form-input"></textarea>
            </div>
            
            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="mic" value="1" checked>
                    <span class="checkmark"></span>
                    I have a microphone
                </label>
            </div>
            
            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="looking_for_team" value="1" checked>
                    <span class="checkmark"></span>
                    I'm looking for a team
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-large">Create Profile</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
